services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "10213:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./apostila_api.html:/usr/share/nginx/html/apostila/index.html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - escola_network
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://escola:${POSTGRES_PASSWORD}@postgres:5432/escoladb
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - escola_network
    restart: unless-stopped

  frontend:
    build: ./frontend
    networks:
      - escola_network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: escola
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: escoladb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - escola_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escola -d escoladb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

networks:
  escola_network:
    driver: bridge
